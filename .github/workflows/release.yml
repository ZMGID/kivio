name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish to (e.g. v2.0.5)'
        required: true
        default: 'v2.5.4'
      ref:
        description: 'Git ref to build from (branch/tag/commit)'
        required: true
        default: 'main'

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}

jobs:
  tauri-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26 = Tahoe runner with Xcode 17 + macOS 26 SDK,需要它来编译
          # Apple Intelligence sidecar(import FoundationModels)。低版本 macOS runner SDK 没这个 framework。
          - platform: macos-26
            args: "--bundles dmg"
          - platform: windows-latest
            args: "--bundles msi,nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Swift sidecars (or stubs on non-macOS)
        run: npm run build:swift

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Kivio ${{ env.RELEASE_TAG }}
          releaseBody: |
            Automated build artifacts for ${{ env.RELEASE_TAG }}.
            Built from: ${{ env.BUILD_REF }}
            - macOS: DMG
            - Windows: MSI + NSIS (.exe)
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          tauriScript: npx tauri
          args: ${{ matrix.args }}

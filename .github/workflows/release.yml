name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v2.0.5)'
        required: true
        default: 'v2.0.5'

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  tauri-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--bundles dmg"
          - platform: windows-latest
            args: "--bundles msi,nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: KeyLingo ${{ env.RELEASE_TAG }}
          releaseBody: |
            Automated build artifacts for ${{ env.RELEASE_TAG }}.
            - macOS: DMG
            - Windows: MSI + NSIS (.exe)
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          tauriScript: npx tauri
          args: ${{ matrix.args }}

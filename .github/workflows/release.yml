name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish to (e.g. v2.7.8)'
        required: true
        default: 'v2.7.8'
      ref:
        description: 'Git ref to build from (branch/tag/commit)'
        required: true
        default: 'main'

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}

jobs:
  tauri-release-windows:
    # windows-latest runner → x86_64-pc-windows-msvc NSIS (.exe) installer.
    # The macOS DMG is built locally on Apple Silicon and uploaded to the same tag.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Swift sidecar stub (non-macOS)
        # On Windows this writes stub binaries so Tauri externalBin validation passes.
        run: npm run build:swift

      - name: Build and publish Windows NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Kivio ${{ env.RELEASE_TAG }}
          releaseBody: |
            Automated Windows (x64) build for ${{ env.RELEASE_TAG }}.
            Built from: ${{ env.BUILD_REF }}
            - Windows: NSIS installer (.exe)

            macOS DMG (Apple Silicon / aarch64, unsigned — first launch: right-click → Open,
            or run `xattr -cr /Applications/Kivio.app`) is built locally and uploaded separately.
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'rc') }}
          includeUpdaterJson: false
          tauriScript: npx tauri
          args: --bundles nsis
